services:
  vue-skeleton:
    build: .
    container_name: vue-skeleton
    ports:
      - "5174:5174"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
    command: npm run dev -- --host 0.0.0.0
    restart: unless-stopped
